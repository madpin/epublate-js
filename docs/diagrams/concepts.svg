<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concepts ER-ish diagram.

  Project owns Chapters owns Segments. Project owns Glossary entries.
  Lore Books are standalone and attach into Projects via per-project
  attachment rows that merge their entries into the active glossary.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="epublate concepts diagram">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="prim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="#0b1220"/>
  <rect x="20" y="20" width="1160" height="440" rx="14" fill="#0f172a" stroke="#1e293b"/>

  <text x="600" y="56" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="600" fill="#f1f5f9">Concepts at a glance</text>
  <text x="600" y="78" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#64748b">Project owns Chapters ’ Segments. Glossary lives in the project. Lore Books attach to projects.</text>

  <!-- Project box -->
  <g transform="translate(80, 130)">
    <rect width="280" height="220" rx="12" fill="#0b1220" stroke="url(#prim)" stroke-width="2"/>
    <text x="140" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e0e7ff">Project</text>
    <text x="140" y="50" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">epublate-project-&lt;id&gt;</text>
    <line x1="20" y1="62" x2="260" y2="62" stroke="#1e293b"/>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">
      <text x="20" y="84">name, source_lang, target_lang</text>
      <text x="20" y="104">style_profile + style_guide</text>
      <text x="20" y="124">budget_usd · context_max_segments</text>
      <text x="20" y="144">llm_overrides (per-project)</text>
      <text x="20" y="164">source ePub (verbatim bytes)</text>
      <text x="20" y="190" fill="#a7f3d0">Owns: Chapters · Glossary · Events</text>
      <text x="20" y="206" fill="#a7f3d0">Owns: LLM audit log · Intake runs</text>
    </g>
  </g>

  <!-- Chapter -->
  <g transform="translate(440, 130)">
    <rect width="240" height="100" rx="12" fill="#0b1220" stroke="#1e293b"/>
    <text x="120" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#bae6fd">Chapter</text>
    <text x="120" y="50" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">one per spine entry</text>
    <line x1="20" y1="62" x2="220" y2="62" stroke="#1e293b"/>
    <text x="20" y="82" font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">spine_idx, href, title, status</text>
  </g>

  <!-- Segment -->
  <g transform="translate(740, 130)">
    <rect width="240" height="100" rx="12" fill="#0b1220" stroke="#1e293b"/>
    <text x="120" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#fde68a">Segment</text>
    <text x="120" y="50" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">smallest cache unit</text>
    <line x1="20" y1="62" x2="220" y2="62" stroke="#1e293b"/>
    <text x="20" y="82" font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">source · target · status · skeleton</text>
  </g>

  <!-- Glossary -->
  <g transform="translate(440, 250)">
    <rect width="240" height="100" rx="12" fill="#0b1220" stroke="#1e293b"/>
    <text x="120" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#fbcfe8">Glossary entry</text>
    <text x="120" y="50" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">proposed · approved · locked</text>
    <line x1="20" y1="62" x2="220" y2="62" stroke="#1e293b"/>
    <text x="20" y="82" font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">type · source · target · aliases</text>
  </g>

  <!-- Lore Book -->
  <g transform="translate(880, 250)">
    <rect width="240" height="100" rx="12" fill="#0b1220" stroke="#a855f7" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="120" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#a7f3d0">Lore Book</text>
    <text x="120" y="50" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">epublate-lore-&lt;id&gt;</text>
    <line x1="20" y1="62" x2="220" y2="62" stroke="#1e293b"/>
    <text x="20" y="82" font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">attaches with mode + priority</text>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <line x1="360" y1="180" x2="438" y2="180" marker-end="url(#arr)"/>
    <line x1="680" y1="180" x2="738" y2="180" marker-end="url(#arr)"/>
    <line x1="220" y1="350" x2="438" y2="300" marker-end="url(#arr)"/>
    <line x1="680" y1="300" x2="878" y2="300" marker-end="url(#arr)" stroke-dasharray="4 4"/>
  </g>

  <text x="400" y="178" font-family="ui-sans-serif, system-ui" font-size="10" fill="#64748b">1 ’ many</text>
  <text x="710" y="178" font-family="ui-sans-serif, system-ui" font-size="10" fill="#64748b">1 ’ many</text>
  <text x="780" y="294" font-family="ui-sans-serif, system-ui" font-size="10" fill="#a855f7">attach</text>

  <text x="600" y="400" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" fill="#64748b">Project entries always win on conflicts. Higher-priority Lore Books beat lower ones in the merged glossary.</text>
</svg>
