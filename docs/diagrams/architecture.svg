<?xml version="1.0" encoding="UTF-8"?>
<!--
  Architecture overview.

  Boxes-and-arrows diagram of the data path: UI Æ state Æ core Æ
  llm/db, with the ePub formats subsystem and the per-project IDB
  layout called out separately. Used in the README and USAGE docs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="epublate architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="primary-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="640" fill="#0b1220"/>
  <rect x="20" y="20" width="1160" height="600" rx="14" fill="#0f172a" stroke="#1e293b"/>

  <!-- title -->
  <text x="600" y="56" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="600" fill="#f1f5f9">Architecture overview</text>
  <text x="600" y="78" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#64748b">UI is dumb À state is shared À core does the work À per-project IDB is the source of truth</text>

  <!-- UI layer -->
  <g transform="translate(60, 110)">
    <rect width="320" height="120" rx="10" fill="#0b1220" stroke="url(#primary-grad)" stroke-width="2"/>
    <text x="160" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#e0e7ff" text-anchor="middle">UI À React + React Router</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">AppShell À Sidebar À BatchStatusBar</text>
      <text x="20" y="74">routes/  Projects À Dashboard À Reader</text>
      <text x="20" y="92">         Glossary À Inbox À Project Settings</text>
      <text x="20" y="110">         LLM activity À Logs À Lore Books</text>
    </g>
  </g>

  <!-- State layer -->
  <g transform="translate(440, 110)">
    <rect width="320" height="120" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="160" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#fef3c7" text-anchor="middle">State À Zustand stores</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">app    À theme, llm config, mock mode</text>
      <text x="20" y="74">ui     À active screen, hotkey registry</text>
      <text x="20" y="92">batch  À in-flight summary, controller</text>
      <text x="20" y="110">project À ephemeral per-project UI state</text>
    </g>
  </g>

  <!-- Core layer -->
  <g transform="translate(820, 110)">
    <rect width="320" height="120" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="160" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#a7f3d0" text-anchor="middle">core/  pipeline À batch À extractor</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">pipeline.translateSegment()</text>
      <text x="20" y="74">batch.runBatch() À concurrency / budget</text>
      <text x="20" y="92">extractor.runIntake() / runPrePass()</text>
      <text x="20" y="110">style À auto_propose À project_bundle À export</text>
    </g>
  </g>

  <!-- LLM layer -->
  <g transform="translate(60, 280)">
    <rect width="320" height="120" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="160" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#fde68a" text-anchor="middle">llm/  provider abstraction</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">openai_compat   À fetch + retry/backoff</text>
      <text x="20" y="74">mock            À deterministic, ?mock=1</text>
      <text x="20" y="92">factory         À resolves library + project</text>
      <text x="20" y="110">prompts/ translator À extractor À review</text>
    </g>
  </g>

  <!-- Glossary / Lore -->
  <g transform="translate(440, 280)">
    <rect width="320" height="120" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="160" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#fbcfe8" text-anchor="middle">glossary/ + lore/</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">matcher       À longest-match, alias-aware</text>
      <text x="20" y="74">enforcer      À validates target against locks</text>
      <text x="20" y="92">io            À JSON/CSV import-export</text>
      <text x="20" y="110">lore.attach   À per-project lore stack</text>
    </g>
  </g>

  <!-- ePub formats -->
  <g transform="translate(820, 280)">
    <rect width="320" height="120" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="160" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#bae6fd" text-anchor="middle">formats/epub/  loader À segmentation À writer</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">loader     À JSZip + DOMParser, doctype_raw</text>
      <text x="20" y="74">segmentation À placeholderise inlines</text>
      <text x="20" y="92">writer     À strip data-epublate-*, byte-passthrough</text>
      <text x="20" y="110">round-trip identity is the invariant</text>
    </g>
  </g>

  <!-- DB -->
  <g transform="translate(60, 450)">
    <rect width="500" height="160" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="250" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#fcd34d" text-anchor="middle">db/  Dexie repos Æ IndexedDB</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">repo/ projects À chapters À segments À glossary</text>
      <text x="20" y="74">      lore À intake À llm_calls À events</text>
    </g>
    <line x1="20" y1="86" x2="480" y2="86" stroke="#1e293b"/>
    <g font-family="ui-monospace, monospace" font-size="11" fill="#cbd5e1">
      <text x="20" y="108">epublate-library              É global state</text>
      <text x="20" y="126">epublate-project-&lt;id&gt;          É one DB per project</text>
      <text x="20" y="144">epublate-lore-&lt;id&gt;             É one DB per Lore Book</text>
    </g>
  </g>

  <!-- Browser side capabilities -->
  <g transform="translate(620, 450)">
    <rect width="520" height="160" rx="10" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="260" y="28" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="600" fill="#fda4af" text-anchor="middle">Browser surface</text>
    <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#94a3b8">
      <text x="20" y="56">localStorage    À Reader scroll position only</text>
      <text x="20" y="74">navigator.storage.persist()  prevent eviction</text>
      <text x="20" y="92">PWA / service worker  cache app shell offline</text>
      <text x="20" y="110">fetch (bound to globalThis)  Æ LLM endpoint</text>
      <text x="20" y="128">downloads     À ePub À project bundle À glossary</text>
      <text x="20" y="146">drag-and-drop À ePub intake À bundle import</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <line x1="380" y1="170" x2="438" y2="170" marker-end="url(#arrow)"/>
    <line x1="760" y1="170" x2="818" y2="170" marker-end="url(#arrow)"/>

    <line x1="220" y1="230" x2="220" y2="278" marker-end="url(#arrow)"/>
    <line x1="600" y1="230" x2="600" y2="278" marker-end="url(#arrow)"/>
    <line x1="980" y1="230" x2="980" y2="278" marker-end="url(#arrow)"/>

    <line x1="220" y1="400" x2="220" y2="448" marker-end="url(#arrow)"/>
    <line x1="600" y1="400" x2="600" y2="448" marker-end="url(#arrow)"/>
    <line x1="980" y1="400" x2="880" y2="448" marker-end="url(#arrow)"/>
  </g>
</svg>
