<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero illustration for the README.

  Stylised sketch of the Dashboard  sidebar, project header, progress
  card, attached-lore strip, chapters list, and translate-batch button.
  Drawn at 1440æ720 so it embeds cleanly in the README banner. Not a
  real screenshot; the docs/screenshots/README.md has instructions for
  capturing one.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-label="epublate dashboard sketch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
