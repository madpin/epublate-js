    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#334155" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- chrome -->
  <rect width="1440" height="720" fill="url(#bg)"/>
  <rect x="16" y="16" width="1408" height="688" rx="12" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>

