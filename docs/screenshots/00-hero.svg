  <line x1="32" y1="84" x2="240" y2="84" stroke="#1e293b" stroke-width="1"/>

  <text x="40" y="108" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" letter-spacing="1" fill="#475569">LIBRARY</text>
  <g transform="translate(32, 122)">
